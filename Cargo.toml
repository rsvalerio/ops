[workspace]
members = ["crates/*", "extensions/*", "extensions-rust/*"]
default-members = ["crates/cli"]
resolver = "2"

[workspace.package]
version = "0.2.0"
edition = "2021"

[workspace.dependencies]
cargo-ops-core = { path = "crates/core" }
cargo-ops-extension = { path = "crates/extension" }
cargo-ops-theme = { path = "crates/theme" }
cargo-ops-runner = { path = "crates/runner" }
cargo-ops-duckdb = { path = "extensions/duckdb" }
cargo-ops-tokei = { path = "extensions/tokei" }
cargo-ops-about = { path = "extensions-rust/about" }
cargo-ops-cargo-toml = { path = "extensions-rust/cargo-toml" }
cargo-ops-cargo-update = { path = "extensions-rust/cargo-update" }
cargo-ops-metadata = { path = "extensions-rust/metadata" }
cargo-ops-tools = { path = "extensions-rust/tools" }
cargo-ops-test-coverage = { path = "extensions-rust/test-coverage" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "2"
tracing = "0.1"
indexmap = { version = "2", features = ["serde"] }
tokio = { version = "1", features = ["process", "macros", "rt-multi-thread", "sync", "io-util", "time"] }

[patch.crates-io]
# RUSTSEC-2026-0037: patch quinn-proto to 0.11.14 (DoS fix)
quinn-proto = { git = "https://github.com/quinn-rs/quinn", rev = "quinn-proto-0.11.14" }

[profile.release]
strip = true
lto = true

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
