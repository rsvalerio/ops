# git-cliff configuration for cargo-ops
# This file is referenced by release-plz.toml

[changelog]
# Changelog header
header = """# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

# Changelog body template using git-cliff syntax
body = """
{%- macro remote_url() -%}
  https://github.com/rsvalerio/cargo-ops
{%- endmacro -%}

{% if version -%}
## [{{ version | trim_start_matches(pat="cargo-ops-v") | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits
| filter(attribute="scope")
| sort(attribute="scope") %}
- **{{ commit.scope }}:** {{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))
{%- endfor -%}
{% for commit in commits %}
{%- if not commit.scope %}
- {{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))
{% endif -%}
{% endfor -%}
{% endfor %}
"""

# Remove leading and trailing whitespace from changelog
trim = true

[git]
# Protect breaking changes (always include feat!: etc. in changelog)
protect_breaking_commits = true

# Commit preprocessors - clean up commit messages
commit_preprocessors = [
  # Remove issue numbers from commit messages
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "" },
]

# Commit parsers - map conventional commits to changelog groups (with emojis)
commit_parsers = [
  { message = "^feat", group = "🚀 Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^doc", group = "📚 Documentation" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^refactor", group = "🚜 Refactoring" },
  { message = "^style", group = "🎨 Styling" },
  { message = "^test", group = "🧪 Testing" },
  { message = "^build", group = "🔧 Build System" },
  { message = "^ci", group = "🔄 CI/CD" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore|^misc", group = "⚙️ Miscellaneous" },
  # Skip merge commits
  { message = "^Merge", skip = true },
]
