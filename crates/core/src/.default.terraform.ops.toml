[commands.verify]
commands = ["fmt", "validate"]
parallel = false
fail_fast = true
help = "Run fmt, validate"
category = "Code Quality"

[commands.qa]
commands = ["plan"]
parallel = false
fail_fast = true
help = "Run plan"
category = "Code Quality"
