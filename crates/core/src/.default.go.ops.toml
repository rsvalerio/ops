# Default commands for Go stack.

[commands.fmt]
program = "go"
args = ["fmt", "./..."]
help = "Format all code"

[commands.vet]
program = "go"
args = ["vet", "./..."]
help = "Vet all packages"

[commands.build]
program = "go"
args = ["build", "./..."]
help = "Build all packages"

[commands.test]
program = "go"
args = ["test", "./..."]
help = "Run all tests"

[commands.verify]
commands = ["fmt", "build"]
parallel = false
fail_fast = true
help = "Run fmt, build"

[commands.qa]
commands = ["test", "vet"]
parallel = false
fail_fast = true
help = "Run test, vet"
