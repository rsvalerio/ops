# Default commands for Rust stack (Cargo).

[commands.fmt]
program = "cargo"
args = ["fmt", "--all"]
help = "Format all code"
category = "Code Quality"

[commands.check]
program = "cargo"
args = ["check", "--all", "--all-features"]
help = "Check all targets"
category = "Code Quality"

[commands.clippy]
program = "cargo"
args = ["clippy", "--all", "--all-features", "--", "-D", "warnings"]
aliases = ["lint"]
help = "Lint with clippy"
category = "Code Quality"

[commands.build]
program = "cargo"
args = ["build", "--all", "--all-features"]
help = "Build all targets"
category = "Build"

[commands.test]
program = "cargo"
args = ["test", "--all", "--all-features", "--", "--ignored"]
help = "Run all tests (ignoring ignored tests)"
category = "Code Quality"

[commands.clean]
program = "cargo"
args = ["clean"]
help = "Remove build artifacts"
category = "Build"

[commands.verify]
commands = ["fmt", "check", "clippy", "build"]
parallel = true
fail_fast = true
help = "Run fmt, check, clippy, build"
category = "Code Quality"

[commands.qa]
commands = ["test", "deps"]
parallel = true
fail_fast = true
help = "Run test, deps"
category = "Code Quality"
