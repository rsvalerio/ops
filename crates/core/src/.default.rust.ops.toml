# Default commands for Rust stack (Cargo).

[commands.fmt]
program = "cargo"
args = ["fmt", "--all"]
help = "Format all code"

[commands.check]
program = "cargo"
args = ["check", "--all", "--all-features"]
help = "Check all targets"

[commands.clippy]
program = "cargo"
args = ["clippy", "--all", "--all-features", "--", "-D", "warnings"]
help = "Lint with clippy"

[commands.build]
program = "cargo"
args = ["build", "--all", "--all-features"]
help = "Build all targets"

[commands.test]
program = "cargo"
args = ["test", "--all", "--all-features"]
help = "Run all tests"

[commands.verify]
commands = ["fmt", "check", "clippy", "build", "test"]
parallel = false
fail_fast = true
help = "Run fmt, check, clippy, build, test"
