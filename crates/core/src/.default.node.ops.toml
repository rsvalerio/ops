[commands.verify]
commands = ["install", "lint", "build"]
parallel = false
fail_fast = true
help = "Run install, lint, build"
category = "Code Quality"

[commands.qa]
commands = ["test"]
parallel = false
fail_fast = true
help = "Run test"
category = "Code Quality"
