# Default commands for Java stack (Gradle).

[commands.compile]
program = "./gradlew"
args = ["compileJava"]
help = "Compile sources"
category = "Build"

[commands.build]
program = "./gradlew"
args = ["build", "-x", "test"]
help = "Build the project"
category = "Build"

[commands.test]
program = "./gradlew"
args = ["test"]
help = "Run all tests"
category = "Code Quality"

[commands.clean]
program = "./gradlew"
args = ["clean"]
help = "Clean build artifacts"
category = "Build"

