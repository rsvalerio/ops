[commands.verify]
commands = ["compile"]
parallel = false
fail_fast = true
help = "Run compile"
category = "Code Quality"

[commands.qa]
commands = ["test"]
parallel = false
fail_fast = true
help = "Run test"
category = "Code Quality"
