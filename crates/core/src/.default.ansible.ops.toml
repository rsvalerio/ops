[commands.verify]
commands = ["lint", "check"]
parallel = false
fail_fast = true
help = "Run lint, check"
category = "Code Quality"

[commands.qa]
commands = ["check"]
parallel = false
fail_fast = true
help = "Run check (dry-run)"
category = "Code Quality"
