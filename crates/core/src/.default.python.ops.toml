[commands.verify]
commands = ["format", "lint"]
parallel = false
fail_fast = true
help = "Run format, lint"
category = "Code Quality"

[commands.qa]
commands = ["test"]
parallel = false
fail_fast = true
help = "Run test"
category = "Code Quality"
