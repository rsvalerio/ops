# Default commands for Python stack.

[commands.format]
program = "ruff"
args = ["format", "."]
help = "Format all code"
category = "Code Quality"

[commands.lint]
program = "ruff"
args = ["check", "."]
help = "Lint the codebase"
category = "Code Quality"

[commands.test]
program = "pytest"
args = []
help = "Run tests"
category = "Code Quality"

