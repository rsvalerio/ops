[package]
name = "cargo-ops-core"
publish = false
version.workspace = true
edition.workspace = true

[features]
test-support = []

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
toml = "1"
toml_edit = "0.25"
config = "0.15"
anyhow = { workspace = true }
tracing = { workspace = true }
indexmap = { workspace = true }
strum = { version = "0.28", features = ["derive"] }
