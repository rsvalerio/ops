[output]
theme = "compact"
#theme = "classic"

[commands.install]
program = "cargo"
args = ["install", "--path", "crates/cli", "--force", "--all-features"]

[commands.before-commit]
commands = ["verify","qa"]
fail_fast = true
parallel = true
help = "Run verify (fmt, check, clippy, build) and qa (test, deps) before committing"
