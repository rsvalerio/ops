name: Bump
permissions:
  contents: write
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  release:
    name: Bump
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'rsvalerio' && github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.RELEASE_TOKEN }}

      # Used in pre_bump_hooks to set the version in Cargo.toml
      - name: Install cargo-edit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit

      # cog bump --auto: determines version from conventional commits, then runs:
      #   pre_bump_hooks:  cargo set-version (updates Cargo.toml)
      #   post_bump_hooks: git push + git push origin <tag>
      # See cog.toml for hook definitions.
      - name: Run `cog bump --auto` (and its hooks)
        uses: cocogitto/cocogitto-action@v4
        id: release
        with:
          command: bump
          args: --auto
          git-user: 'github-actions[bot]'
          git-user-email: '41898282+github-actions[bot]@users.noreply.github.com'
