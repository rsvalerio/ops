name: Bump
permissions:
  contents: write
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  release:
    name: Bump
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'rsvalerio' && github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.RELEASE_TOKEN }}

      # Install cargo-edit and cocogitto
      - name: Install cargo-edit and cocogitto
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit,cocogitto

      # Configure git user for commits/tags
      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # cog bump --auto: determines version from conventional commits, then runs:
      #   pre_bump_hooks:  cargo set-version (updates Cargo.toml)
      #   post_bump_hooks: git push + git push origin <tag>
      # See cog.toml for hook definitions.
      - name: Run cog bump --auto
        run: cog -vvv bump --auto
