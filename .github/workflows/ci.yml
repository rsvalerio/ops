name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
          rustflags: ""
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install ops
        uses: jaxxstorm/action-install-gh-release@v1
        with:
          repo: rsvalerio/ops
      - name: Format all code
        run: ops fmt

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install ops
        uses: jaxxstorm/action-install-gh-release@v1
        with:
          repo: rsvalerio/ops
      - name: Check all targets
        run: ops check

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install ops
        uses: jaxxstorm/action-install-gh-release@v1
        with:
          repo: rsvalerio/ops
      - name: Lint with clippy
        run: ops clippy

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install ops
        uses: jaxxstorm/action-install-gh-release@v1
        with:
          repo: rsvalerio/ops
      - name: Build all targets
        run: ops build

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      # Verbose cargo invocations (compile lines, `rustc` commands).
      CARGO_TERM_VERBOSE: true
      # Ops CLI tracing (stderr); merges with `RUST_LOG` if set.
      OPS_LOG_LEVEL: debug
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install ops
        uses: jaxxstorm/action-install-gh-release@v1
        with:
          repo: rsvalerio/ops
      - name: Run all tests
        run: ops test

  deps:
    name: Deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install cargo-edit and cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit,cargo-deny
      - name: Install ops
        uses: jaxxstorm/action-install-gh-release@v1
        with:
          repo: rsvalerio/ops
      - name: Check dependencies, advisories, licenses, bans and sources in the workspace
        run: ops deps
