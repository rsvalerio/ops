name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        shell: bash
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "VERSION=$CARGO_VERSION" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          ARCHIVE="ops-v${VERSION}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" ops
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ops-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum ops-*.tar.gz > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/ops-*.tar.gz
            artifacts/checksums-sha256.txt

  update-homebrew:
    name: Update Homebrew Formula
    needs: [build, release]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 checksums
        run: |
          echo "SHA_AARCH64_APPLE=$(sha256sum artifacts/ops-v${VERSION}-aarch64-apple-darwin.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "SHA_X86_64_APPLE=$(sha256sum artifacts/ops-v${VERSION}-x86_64-apple-darwin.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "SHA_X86_64_LINUX=$(sha256sum artifacts/ops-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "SHA_AARCH64_LINUX=$(sha256sum artifacts/ops-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: rsvalerio/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Generate formula
        run: |
          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/ops.rb << FORMULA
          class Ops < Formula
            desc "Batteries-included task runner for any stack"
            homepage "https://github.com/rsvalerio/cargo-ops"
            license "Apache-2.0"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/rsvalerio/cargo-ops/releases/download/v${VERSION}/ops-v${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64_APPLE}"
              else
                url "https://github.com/rsvalerio/cargo-ops/releases/download/v${VERSION}/ops-v${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64_APPLE}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/rsvalerio/cargo-ops/releases/download/v${VERSION}/ops-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_AARCH64_LINUX}"
              else
                url "https://github.com/rsvalerio/cargo-ops/releases/download/v${VERSION}/ops-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_64_LINUX}"
              end
            end

            def install
              bin.install "ops"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/ops --version")
            end
          end
          FORMULA

      - name: Commit and push formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ops.rb
          git commit -m "ops ${VERSION}"
          git push
